[module/bi]
type                        = custom/text
content                     = "%{T5}%{T-}"
content-foreground          = ${colors.mb}
content-background          = ${colors.background}

[module/bd]
type                        = custom/text
content                     = "%{T5}%{T-}"
content-foreground          = ${colors.mb}
content-background          = ${colors.background}

######################################################

[module/sep]
type = custom/text
content = " "
content-foreground = ${color.bg}

####################################################


[module/i3]
    type = internal/i3

    pin-workspaces = true
    show-urgent = true
    enable-scroll = false


    format = <label-state> <label-mode>
    format-font = 0

    label-mode = %mode%
    label-mode-padding = 0
    label-mode-background = #cc241d

    label-focused = %index%
    label-focused-foreground = ${colors.yellow}
    label-focused-background = ${colors.mb}
    label-focused-padding = 1


    label-unfocused = %index%
    label-unfocused-padding = 0
    label-unfocused-background = ${colors.mb}


    label-visible = %index%
    label-visible-underline = #555555
    label-visible-padding = 0

    label-urgent = %index%
    label-urgent-foreground = #000000
    label-urgent-background = #bd2c40
    label-urgent-padding = 0

    label-separator = |
    label-separator-padding = 0
    label-separator-foreground = ${colors.yellow}
    label-separator-background = ${colors.mb}



[module/xwindow]
    type = internal/xwindow
    label = %title:0:60:...%

[module/pulseaudio]
    type = internal/pulseaudio

    ;;sink = alsa_output.pci-0000_00_1b.0.analog-stereo
    use-ui-max = true
    interval = 5

    format-volume = <label-volume>
    format-volume-prefix = " "
    format-volume-prefix-font = 1
    format-volume-background = ${colors.mb}
    format-volume-foreground = ${colors.blue}

    label-volume = " %percentage%% "
    label-volume-background = ${colors.mb}
    label-volume-foreground = ${colors.foreground}

    format-muted = <label-muted>
    format-muted-prefix = 
    format-muted-prefix-font = 1
    format-muted-foreground = ${colors.indigo}
    format-muted-background = ${colors.mb}
    label-muted = " Muted "
    label-muted-foreground = ${colors.red}
    label-muted-background = ${colors.mb}

    ramp-volume-0 = 
    ramp-volume-1 = 
    ramp-volume-2 = 
    ramp-volume-3 = 
    ramp-volume-4 = 


[module/memory]
    type = internal/memory
    interval = 3

    format = <label>
    format-prefix-font = 2
    format-prefix = "󰍛 "
    format-prefix-background = ${colors.mb}
    format-prefix-foreground = ${colors.green}

    label = %percentage_used:2%%
    label-foreground = ${colors.foreground}
    label-background = ${colors.mb}

[module/cpu]
    type = internal/cpu

    interval = 0.5

    format = <label>
    format-prefix = "󰨣 "
    format-prefix-font = 2
    format-prefix-background = ${colors.mb}
    format-prefix-foreground = ${colors.red}

    label = %percentage%%
    label-foreground = ${colors.foreground}
    label-background = ${colors.mb}
    label-prefix-font = 1

[module/date]
    type = custom/script

    format-prefix = "  "
    exec = date +'%d/%m/%Y - %H:%M'
    tail = false
    interval = 5

    format-foreground = ${colors.foreground}
    format-background = ${colors.mb}
    format-prefix-foreground = ${colors.foreground}
    click-right = ticktick

[module/wlan]
    type = internal/network
    interface = wlp0s20f3

    interval = 3.0
    accumulate-stats = true
    unknown-as-up = true


    format-connected = <label-connected>
    format-connected-prefix = " "
    format-connected-prefix-font = 2
    format-connected-background = ${color.mb}
    format-connected-foreground = ${color.green}

    speed-unit = ""
    label-connected = %downspeed:1%
    label-connected-background = ${color.mb}
    label-connected-foreground = ${color.amber}

    format-disconnected = <label-disconnected>
    format-disconnected-prefix = " "
    format-disconnected-prefix-font = 2
    format-disconnected-prefix-background = ${color.mb}
    format-disconnected-foreground = ${color.red}

    label-disconnected = "Offline"
    label-disconnected-background = ${color.mb}
    label-disconnected-foreground = ${color.red}


[module/battery]

    type = internal/battery
    full-at = 99
    battery = ${system.sys_battery}
    adapter = ${system.sys_adapter}
    poll-interval = 2
    time-format = %H:%M

    format-label-charging-background = ${colors.mb}

    format-charging = <animation-charging><label-charging>
    format-charging-prefix = " "
    format-charging-prefix-font = 2
    format-charging-prefix-foreground = ${colors.red}
    label-charging = " %percentage%%"

    format-discharging = <ramp-capacity><label-discharging>
    label-discharging = " %percentage%%"

    format-full = <label-full>
    format-full-prefix = " "
    format-full-background = ${colors.mb}
    format-full-prefix-font = 2
    format-full-prefix-foreground = ${colors.green}
    format-full-prefix-background = ${colors.mb}
    label-full = "%percentage%%"

    ramp-capacity-0 = 
    ramp-capacity-1 = 
    ramp-capacity-2 = 
    ramp-capacity-3 = 
    ramp-capacity-4 = 
    ramp-capacity-foreground = ${colors.yellow}
    ramp-capacity-background = ${colors.mb}
    ramp-capacity-font = 2

    animation-charging-0 = 
    animation-charging-1 = 
    animation-charging-2 = 
    animation-charging-3 = 
    animation-charging-4 = 
    animation-charging-foreground = ${colors.green}
    animation-charging-background = ${colors.mb}
    animation-charging-font = 2
    animation-charging-framerate = 700
